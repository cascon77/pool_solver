name: pool_solution
description: "Aplication to resolve problems about the swimming pool"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  sqlite3_flutter_libs: ^0.5.20
  drift: ^2.17.0
  path_provider: ^2.1.3

  fl_chart: ^0.67.0
  flutter_animate: ^4.5.0
  reactive_forms: ^16.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  path: ^1.9.1
  drift_dev: ^2.29.0
  build_runner: ^2.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  translations_cleaner: ^0.2.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
  generate: true
